name: Generate cumulative activity chart

on:
  schedule:
    # Every 4 hours at :20 past (00:20, 04:20, 08:20, … UTC) so the numbers stay
    # fresh through the day. Free: Actions minutes are unlimited on public repos.
    # The :20 offset from the weekdays chart keeps the two runs off the same
    # minute on the shared github.com contributions fragment (and the push step
    # rebase-retries anyway). Current-year boundary is anchored to Berlin in the
    # script (CHART_TZ), independent of when this fires.
    - cron: "20 */4 * * *"
  workflow_dispatch:
  push:
    paths:
      - "scripts/cumulative.mjs"
      - ".github/workflows/cumulative.yml"

# Serialize runs so concurrent triggers never race on the `git push` for
# assets/cumulative.svg. A queued run waits for the in-flight one to finish.
concurrency:
  group: cumulative
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  cumulative:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # We commit SVG back to main; fetch full history so git can compute
          # the diff at the end (cheap — repo is single-purpose).
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Generate cumulative chart SVG
        env:
          GH_USERNAME: sepahead
        # No token: the script scrapes github.com/users/{login}/contributions
        # (a different host from api.github.com, so not subject to the Actions-
        # runner API rate limit). The public per-year <h2> total already
        # INCLUDES private contributions because the profile has "include
        # private contributions" enabled, so the numbers are complete without a
        # PAT. Do not add a token here — see the header note in the script.
        run: node scripts/cumulative.mjs

      - name: Commit updated cumulative chart SVG
        run: |
          # Stage FIRST, then diff the INDEX against HEAD (catches both new and
          # modified files; a bare `git diff <path>` would ignore an untracked
          # SVG and never push it).
          git add assets/cumulative.svg
          if git diff --cached --quiet HEAD -- assets/cumulative.svg; then
            echo "No changes to cumulative.svg — skipping commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -m "chore(cumulative): regenerate annual activity chart"
          # Robust push: the weekdays workflow can run concurrently and push
          # weekdays.svg to main at the same moment (any commit touching both
          # scripts triggers both workflows), and a maintainer may push too. A
          # plain `git push` then fails non-fast-forward. The two chart workflows
          # touch DIFFERENT files, so rebasing onto the concurrent commit is
          # always conflict-free — pull --rebase and retry.
          for attempt in 1 2 3 4 5; do
            if git push origin HEAD:main; then
              echo "pushed on attempt $attempt"; exit 0
            fi
            echo "push attempt $attempt failed; rebasing on origin/main…"
            sleep 2
            git pull --rebase origin main || exit 1
          done
          echo "push failed after 5 attempts"; exit 1
