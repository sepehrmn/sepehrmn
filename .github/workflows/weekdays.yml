name: Generate weekday activity chart

on:
  schedule:
    # Run once per day at 04:00 UTC so the chart is fresh by morning US/EU.
    - cron: "0 4 * * *"
  workflow_dispatch:
  push:
    paths:
      - "scripts/weekdays.mjs"
      - ".github/workflows/weekdays.yml"
    paths-ignore:
      - "assets/**"

# Serialize weekday runs so concurrent triggers never race on the
# `git push` for assets/weekdays.svg. A queued run will wait for the
# in-flight one to finish pushing.
concurrency:
  group: weekdays
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  weekdays:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # We commit SVG back to main; fetch full history so git can compute
          # the diff at the end (cheap — repo is single-purpose).
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Generate weekday chart SVG
        env:
          GH_USERNAME: sepehrmn
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node scripts/weekdays.mjs

      - name: Commit updated weekday chart SVG
        run: |
          if ! git diff --quiet assets/weekdays.svg; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add assets/weekdays.svg
            git commit -m "chore(weekdays): regenerate weekday activity chart"
            git push
          else
            echo "No changes to weekdays.svg — skipping commit."
          fi
