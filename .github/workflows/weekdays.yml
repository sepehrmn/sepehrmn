name: Generate weekday activity chart

on:
  schedule:
    # Every 4 hours (00:00, 04:00, 08:00, etc UTC) so the live numbers stay fresh
    # through the day. Free: Actions minutes are unlimited on public repos.
    # GitHub cron is UTC-only and best-effort (runs can be delayed under load);
    # the chart's "today" is anchored to Europe/Berlin in the script (CHART_TZ),
    # independent of when this fires.
    - cron: "0 */4 * * *"
  workflow_dispatch:
  push:
    paths:
      - "scripts/weekdays.mjs"
      - ".github/workflows/weekdays.yml"
    # NOTE: GitHub rejects combining `paths` + `paths-ignore` on the same
    # event with HTTP 422 ("you may only define one of paths and paths-ignore
    # for a single event"). The "regen commits the SVG, regen re-triggers"
    # loop is already broken by the `git diff --cached --quiet HEAD` guard in
    # the commit step, so we don't need a filter here.

# Serialize weekday runs so concurrent triggers never race on the
# `git push` for assets/weekdays.svg. A queued run will wait for the
# in-flight one to finish pushing.
concurrency:
  group: weekdays
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  weekdays:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # We commit SVG back to main; fetch full history so git can compute
          # the diff at the end (cheap, repo is single-purpose).
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Generate weekday chart SVG
        env:
          GH_USERNAME: sepahead
        # No token by design. The script scrapes the server-rendered fragment at
        # github.com/users/{login}/contributions, NOT api.github.com, so it
        # needs NO token and isn't subject to the 60/hr unauthenticated
        # api.github.com limit that is permanently exhausted on shared Actions
        # runner IPs. The public daily counts already INCLUDE private
        # contributions (the profile has "include private contributions"
        # enabled), so the totals are complete. Do not add a token here.
        run: node scripts/weekdays.mjs

      - name: Commit updated weekday chart SVG
        run: |
          # Stage FIRST, then diff the INDEX against HEAD. A bare
          # `git diff <path>` only sees modifications to TRACKED files, it
          # ignores untracked files, so a freshly-generated-but-never-committed
          # assets/weekdays.svg would always read "no changes" and never get
          # pushed. (That was the original bug: the file was never tracked, so
          # the guard short-circuited and the chart stayed broken on the live
          # profile.) Staging then diffing the index catches both new and
          # modified files.
          git add assets/weekdays.svg
          if git diff --cached --quiet HEAD -- assets/weekdays.svg; then
            echo "No changes to weekdays.svg; skipping commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -m "chore(weekdays): regenerate weekday activity chart"
          # Robust push: the cumulative workflow can run concurrently and push
          # cumulative.svg to main at the same moment (any commit touching both
          # scripts triggers both workflows), and a maintainer may push too. A
          # plain `git push` then fails non-fast-forward. The two chart workflows
          # touch DIFFERENT files, so rebasing onto the concurrent commit is
          # always conflict-free: pull --rebase and retry.
          for attempt in 1 2 3 4 5; do
            if git push origin HEAD:main; then
              echo "pushed on attempt $attempt"; exit 0
            fi
            echo "push attempt $attempt failed; rebasing on origin/main…"
            sleep 2
            git pull --rebase origin main || exit 1
          done
          echo "push failed after 5 attempts"; exit 1
