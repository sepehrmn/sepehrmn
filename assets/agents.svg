<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 312" width="860" height="312" role="img" aria-label="Agents manifest — the AI coding agents I build with. Pi (lead, mono the agent); Claude Code (engineer, deep refactors); Codex (generalist, broad coverage); Cursor (editor, in-IDE pair); Amp (autonomous, long-horizon runs); Aider (surgical, git-native edits). The loop never sleeps.">
  <title>Agents manifest</title>
  <defs><linearGradient id="sweepFwd" gradientUnits="userSpaceOnUse" x1="-120" y1="0" x2="0" y2="0">
      <stop offset="0" stop-color="#34d399" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#34d399" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#34d399" stop-opacity="0"/>
      <animate attributeName="x1" from="-120" to="820" dur="3.4s" repeatCount="indefinite"/>
      <animate attributeName="x2" from="0" to="940" dur="3.4s" repeatCount="indefinite"/>
    </linearGradient></defs>
  <style>
    :root { --em: #34d399; }
    .panel { fill: #ffffff; fill-opacity: 0.022; stroke: #ffffff; stroke-opacity: 0.07; }
    .spine { stroke: #34d399; stroke-width: 4; stroke-linecap: round; }
    .cap   { font: 600 11px ui-monospace, SFMono-Regular, Menlo, monospace; fill: #6e7681; letter-spacing: 2px; }
    .prompt{ font: 600 14px ui-monospace, SFMono-Regular, Menlo, monospace; fill: #34d399; }
    .cmd   { font: 600 14px ui-monospace, SFMono-Regular, Menlo, monospace; fill: #c9d1d9; }
    .flag  { font: 600 14px ui-monospace, SFMono-Regular, Menlo, monospace; fill: #6e7681; }
    .live  { font: 600 14px ui-monospace, SFMono-Regular, Menlo, monospace; fill: #34d399; }
    .name  { font: 600 15px ui-monospace, SFMono-Regular, Menlo, monospace; fill: #c9d1d9; }
    .chip  { fill: #ffffff; fill-opacity: 0.04; stroke: #34d399; stroke-width: 1.3; }
    .chip-label { font: 600 11px ui-monospace, SFMono-Regular, Menlo, monospace; fill: #34d399; }
    .note  { font: 400 12.5px ui-monospace, SFMono-Regular, Menlo, monospace; fill: #6e7681; }
    .pip   { fill: #34d399; }
    .rail  { stroke: #30363d; stroke-width: 1; }
    .flow  { fill: none; stroke: #e2faff; stroke-width: 2.4; stroke-dasharray: 1.5 9; stroke-linecap: round; opacity: 0.9; }
    .tag   { font: 400 13px ui-monospace, SFMono-Regular, Menlo, monospace; fill: #6e7681; }
    .cursor{ fill: #34d399; animation: curblink 1s steps(1) infinite; }
    @keyframes curblink { 0%, 50% { opacity: 1; } 50.01%, 100% { opacity: 0; } }
    @media (prefers-color-scheme: light) {
      :root { --em: #059669; }
      .panel { fill: #0b1f2a; fill-opacity: 0.025; stroke: #0b1f2a; stroke-opacity: 0.08; }
      .spine { stroke: #059669; }
      .cap, .flag, .note, .tag { fill: #57606a; }
      .prompt, .live, .chip-label, .cursor { fill: #059669; }
      .chip { stroke: #059669; }
      .pip { fill: #059669; }
      .cmd, .name { fill: #1f2328; }
      .rail { stroke: #d0d7de; }
      .flow { stroke: #22d3ee; }
    }
    @media (prefers-reduced-motion: reduce) {
      animate { display: none; }
      .cursor { animation: none; visibility: hidden; }
      .flow { display: none; }
      .pip { opacity: 1; }
    }
  </style>

  <rect x="0.5" y="0.5" width="859" height="311" rx="16" class="panel"/>
  <rect x="40" y="0.5" width="780" height="3" rx="1.5" fill="url(#sweepFwd)"/>
  <path d="M6 20 V292" class="spine"/>

  <text x="40" y="34" class="cap">// AGENTS &#8212; MANIFEST</text>
  <text x="40" y="60"><tspan class="prompt">&#10095; </tspan><tspan class="cmd">roster </tspan><tspan class="flag">--status </tspan><tspan class="live">live</tspan></text>
  <rect x="231" y="47" width="9" height="15" rx="1" class="cursor"/>

  <g>
    <circle cx="46" cy="88" r="7" fill="none" stroke="var(--em)" stroke-opacity="0.5"/>
    <circle cx="46" cy="88" r="4" class="pip">
      <animate attributeName="opacity" values="1;0.35;1" dur="1.8s" begin="0.00s" repeatCount="indefinite"/>
    </circle>
    <text x="62" y="97" class="name">Pi</text>
    <rect x="94" y="83" width="50" height="22" rx="6" class="chip"/>
    <text x="119" y="97" text-anchor="middle" class="chip-label">lead</text>
    <text x="156" y="96" class="note">// mono · the agent</text>
  </g>
  <g>
    
    <circle cx="46" cy="118" r="4" class="pip">
      <animate attributeName="opacity" values="1;0.35;1" dur="1.8s" begin="0.25s" repeatCount="indefinite"/>
    </circle>
    <text x="62" y="127" class="name">Claude Code</text>
    <rect x="175" y="113" width="82" height="22" rx="6" class="chip"/>
    <text x="216" y="127" text-anchor="middle" class="chip-label">engineer</text>
    <text x="269" y="126" class="note">// deep refactors</text>
  </g>
  <g>
    
    <circle cx="46" cy="148" r="4" class="pip">
      <animate attributeName="opacity" values="1;0.35;1" dur="1.8s" begin="0.50s" repeatCount="indefinite"/>
    </circle>
    <text x="62" y="157" class="name">Codex</text>
    <rect x="121" y="143" width="98" height="22" rx="6" class="chip"/>
    <text x="170" y="157" text-anchor="middle" class="chip-label">generalist</text>
    <text x="231" y="156" class="note">// broad coverage</text>
  </g>
  <g>
    
    <circle cx="46" cy="178" r="4" class="pip">
      <animate attributeName="opacity" values="1;0.35;1" dur="1.8s" begin="0.75s" repeatCount="indefinite"/>
    </circle>
    <text x="62" y="187" class="name">Cursor</text>
    <rect x="130" y="173" width="66" height="22" rx="6" class="chip"/>
    <text x="163" y="187" text-anchor="middle" class="chip-label">editor</text>
    <text x="208" y="186" class="note">// in-IDE pair</text>
  </g>
  <g>
    
    <circle cx="46" cy="208" r="4" class="pip">
      <animate attributeName="opacity" values="1;0.35;1" dur="1.8s" begin="1.00s" repeatCount="indefinite"/>
    </circle>
    <text x="62" y="217" class="name">Amp</text>
    <rect x="103" y="203" width="98" height="22" rx="6" class="chip"/>
    <text x="152" y="217" text-anchor="middle" class="chip-label">autonomous</text>
    <text x="213" y="216" class="note">// long-horizon runs</text>
  </g>
  <g>
    
    <circle cx="46" cy="238" r="4" class="pip">
      <animate attributeName="opacity" values="1;0.35;1" dur="1.8s" begin="1.25s" repeatCount="indefinite"/>
    </circle>
    <text x="62" y="247" class="name">Aider</text>
    <rect x="121" y="233" width="82" height="22" rx="6" class="chip"/>
    <text x="162" y="247" text-anchor="middle" class="chip-label">surgical</text>
    <text x="215" y="246" class="note">// git-native edits</text>
  </g>

  <text x="40" y="282" class="tag">// the loop never sleeps</text>
  <line x1="40" y1="290" x2="820" y2="290" class="rail"/>
  <path d="M40 290 H820" class="flow">
    <animate attributeName="stroke-dashoffset" from="24" to="0" dur="1.5s" repeatCount="indefinite"/>
  </path>
</svg>
