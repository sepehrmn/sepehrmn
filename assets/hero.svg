<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 176" width="860" height="176" role="img" aria-label="Sepehr Mahmoudian — agentic engineering, continual learning, knowledge graphs and RAG; AI/ML and neurorobotics; defense tech and threat detection. Berlin.">
  <style>
    /* Theme colors mirror assets/weekdays.svg so the page reads as one system. */
    .wordmark { font: 700 40px ui-monospace, SFMono-Regular, Menlo, monospace; fill: #22d3ee; letter-spacing: -1px; }
    .role     { font: 500 20px ui-monospace, SFMono-Regular, Menlo, monospace; fill: #c9d1d9; }
    .meta     { font: 400 13px ui-monospace, SFMono-Regular, Menlo, monospace; fill: #6e7681; }
    .cursor   { fill: #22d3ee; }
    .underline-base { stroke: #30363d; stroke-width: 2; fill: none; }
    @media (prefers-color-scheme: light) {
      .wordmark { fill: #0891b2; }
      .role     { fill: #1f2328; }
      .meta     { fill: #57606a; }
      .cursor   { fill: #0891b2; }
      .underline-base { stroke: #d0d7de; }
    }
    /* Respect reduced-motion: stop all animation, show a sensible static state
       (wordmark + cursor solid + the first role visible). Each role's base
       opacity attribute is set for exactly this fallback. */
    @media (prefers-reduced-motion: reduce) {
      animate, animateTransform { display: none; }
    }
  </style>

  <!-- Wordmark = the name (searchable, matches the publication byline).
       textLength locks rendered width so cursor + underline are stable
       regardless of the host's monospace font metrics. -->
  <text x="40" y="68" class="wordmark" textLength="500" lengthAdjust="spacingAndGlyphs">Sepehr Mahmoudian</text>

  <!-- Blinking block cursor right after the wordmark. -->
  <rect x="548" y="36" width="13" height="38" rx="2" class="cursor">
    <animate attributeName="opacity" values="1;1;0;0" keyTimes="0;0.5;0.5;1" dur="1.05s" repeatCount="indefinite"/>
  </rect>

  <!-- Animated underline: a static muted base + a bright cyan band sweeping
       left→right along it, drawn via an animated linearGradient. -->
  <line x1="40" y1="86" x2="540" y2="86" class="underline-base"/>
  <rect x="40" y="83" width="500" height="6" rx="3" fill="url(#sweep)">
    <title>Sepehr Mahmoudian</title>
  </rect>
  <defs>
    <linearGradient id="sweep" gradientUnits="userSpaceOnUse" x1="-60" y1="0" x2="60" y2="0">
      <stop offset="0"   stop-color="#22d3ee" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#22d3ee" stop-opacity="0.9"/>
      <stop offset="1"   stop-color="#22d3ee" stop-opacity="0"/>
      <animate attributeName="x1" from="-60" to="560" dur="3.2s" repeatCount="indefinite"/>
      <animate attributeName="x2" from="60"  to="680" dur="3.2s" repeatCount="indefinite"/>
    </linearGradient>
  </defs>

  <!-- Rotating role line — three pillars. Each shares one 15s cycle and is
       visible in its own 5s slot (~0.45s fade-in, ~4s hold, ~0.45s fade-out)
       via staggered keyTimes. Base opacity attributes give a clean
       reduced-motion fallback (the first line stays visible). -->
  <g>
    <text x="40" y="124" class="role" opacity="1">
      Agentic Engineering · Continual Learning · Knowledge Graphs · RAG
      <animate attributeName="opacity"
        values="0;1;1;0;0"
        keyTimes="0;0.03;0.30;0.3333;1"
        dur="15s" repeatCount="indefinite"/>
    </text>
    <text x="40" y="124" class="role" opacity="0">
      AI / ML · Neurorobotics
      <animate attributeName="opacity"
        values="0;0;1;1;0;0"
        keyTimes="0;0.3333;0.3633;0.6367;0.6667;1"
        dur="15s" repeatCount="indefinite"/>
    </text>
    <text x="40" y="124" class="role" opacity="0">
      Defense Tech · Threat Detection
      <animate attributeName="opacity"
        values="0;0;1;1;0"
        keyTimes="0;0.6667;0.6967;0.97;1"
        dur="15s" repeatCount="indefinite"/>
    </text>
  </g>

  <text x="40" y="158" class="meta">High Energy  ·  High Agency  ·  Takes Initiative  ·  Consistent</text>
</svg>
