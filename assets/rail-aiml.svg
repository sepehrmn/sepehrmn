<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 30" width="860" height="30" role="img" aria-label="AI / ML stack">
  <title>AI / ML stack</title>
  <defs><linearGradient id="rail-aiml" gradientUnits="userSpaceOnUse" x1="71" y1="0" x2="181" y2="0">
      <stop offset="0" stop-color="#fbbf24" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#fbbf24" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#fbbf24" stop-opacity="0"/>
      <animate attributeName="x1" from="71" to="740" dur="3.2s" begin="0s" repeatCount="indefinite"/>
      <animate attributeName="x2" from="181" to="850" dur="3.2s" begin="0s" repeatCount="indefinite"/>
    </linearGradient></defs>
  <style>
    .label { font: 700 13px ui-monospace, SFMono-Regular, Menlo, monospace; fill: #c9d1d9; letter-spacing: 3px; }
    .cap   { font: 600 10px ui-monospace, SFMono-Regular, Menlo, monospace; fill: #6e7681; letter-spacing: 2px; }
    .spine { stroke: #fbbf24; stroke-width: 4; stroke-linecap: round; }
    .rule  { stroke: #30363d; stroke-width: 1; }
    @media (prefers-color-scheme: light) {
      .label { fill: #1f2328; }
      .cap { fill: #57606a; }
      .spine { stroke: #b45309; }
      .rule { stroke: #d0d7de; }
    }
    @media (prefers-reduced-motion: reduce) { animate { display: none; } }
  </style>
  <path d="M72 6 V24" class="spine"/>
  <text x="92" y="20" class="label" textLength="73" lengthAdjust="spacingAndGlyphs">AI / ML</text>
  <text x="740" y="20" text-anchor="end" class="cap"># 8 tools</text>
  <line x1="181" y1="24.5" x2="740" y2="24.5" class="rule"/>
  <rect x="181" y="23" width="559" height="3" rx="1.5" fill="url(#rail-aiml)"/>
</svg>
