<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 139 48" width="139" height="48" role="img" aria-label="Scholar — Google Scholar · Sepehr Mahmoudian">
  <title>Scholar — Google Scholar · Sepehr Mahmoudian</title>
  <defs>
    <radialGradient id="wash" cx="0%" cy="50%" r="120%">
      <stop offset="0" stop-color="#6c9bf0" stop-opacity="0.18"/>
      <stop offset="62%" stop-color="#6c9bf0" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <style>
    :root { --accent: #6c9bf0; color-scheme: light dark; }
    .pill  { fill: #ffffff; fill-opacity: 0.022; stroke: #ffffff; stroke-opacity: 0.07; stroke-width: 1; }
    .seat  { fill: #6c9bf0; fill-opacity: 0.14; stroke: #6c9bf0; stroke-opacity: 0.85; stroke-width: 1.4; }
    .glyph { fill: #6c9bf0; }
    .name  { font: 700 14px ui-monospace, SFMono-Regular, Menlo, monospace; fill: #c9d1d9; letter-spacing: 0.5px; }
    text { paint-order: stroke; stroke: #0d1117; stroke-width: 2.6; stroke-linejoin: round; }
    @media (prefers-color-scheme: light) {
      text { stroke: #ffffff; }
      :root { --accent: #3367d6; }
      .pill  { fill: #0b1f2a; fill-opacity: 0.025; stroke: #0b1f2a; stroke-opacity: 0.08; }
      .wash  { display: none; }
      .seat  { fill: #3367d6; fill-opacity: 0.10; stroke: #3367d6; }
      .glyph { fill: #3367d6; }
      .name  { fill: #1f2328; }
    }
    /* Hover / click affordance — progressive enhancement (GitHub img sandboxes
       the internal :hover of an img-embedded SVG, so this shows when the badge is
       viewed directly or inline). Gated to hover-capable devices so a tap on
       touch doesn't leave a sticky lifted/glowing state. */
    @media (hover: hover) {
      .badge-group {
        cursor: pointer;
        transition: transform 0.22s cubic-bezier(0.34, 1.56, 0.64, 1), filter 0.22s ease;
      }
      .badge-group:hover { transform: translateY(-3px); filter: drop-shadow(0 6px 14px rgba(0, 0, 0, 0.45)); }
      .badge-group:hover .pill { stroke-opacity: 0.3; }
      .badge-group:hover .seat { fill-opacity: 0.26; filter: drop-shadow(0 0 5px var(--accent)); }
      .badge-group:hover .glyph { filter: drop-shadow(0 0 4px var(--accent)); }
      .badge-group:active {
        transform: translateY(-1px);
        filter: drop-shadow(0 3px 8px rgba(0, 0, 0, 0.3));
        transition: transform 0.08s ease, filter 0.08s ease;
      }
      @media (prefers-reduced-motion: reduce) {
        .badge-group, .badge-group:hover, .badge-group:active { transition: none; transform: none; }
      }
    }
  </style>
  <g class="badge-group">
    <rect x="1.5" y="0.5" width="136" height="47" rx="14" class="pill"/>
    <rect x="1.5" y="0.5" width="136" height="47" rx="14" fill="url(#wash)" class="wash"/>
    <rect x="12" y="7" width="34" height="34" rx="10" class="seat"/>
    <g transform="translate(19 14) scale(0.8333)" class="glyph"><path fill-rule="evenodd" d="M5.242 13.769L0 9.5 12 0l12 9.5-5.242 4.269C17.548 11.249 14.978 9.5 12 9.5c-2.977 0-5.548 1.748-6.758 4.269zM12 10a7 7 0 1 0 0 14 7 7 0 0 0 0-14z"/></g>
    <text x="58" y="30" class="name">Scholar</text>
  </g>
</svg>
