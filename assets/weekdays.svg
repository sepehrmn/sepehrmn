<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 340" width="760" height="340" role="img" aria-label="Weekday contribution share over the last 500 days: 3948 total, peak Sun at 18.7%">
  <defs>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <style>
    .panel { fill: #ffffff; fill-opacity: 0.022; stroke: #ffffff; stroke-opacity: 0.07; }
    .title { font: 600 15px ui-monospace, SFMono-Regular, Menlo, monospace; fill: #67e8f9; }
    .subtitle { font: 500 11px ui-monospace, SFMono-Regular, Menlo, monospace; fill: #8b949e; }
    .center-num { font: 700 32px ui-monospace, SFMono-Regular, Menlo, monospace; fill: #22d3ee; letter-spacing: -1px; }
    .center-sub { font: 500 11px ui-monospace, SFMono-Regular, Menlo, monospace; fill: #8b949e; }
    .center-streak { font: 700 12px ui-monospace, SFMono-Regular, Menlo, monospace; fill: #fbbf24; }
    .legend-label { font: 500 13px ui-monospace, SFMono-Regular, Menlo, monospace; fill: #c9d1d9; }
    .legend-peak { font-weight: 700; fill: #22d3ee; }
    .legend-swatch { fill: #22d3ee; fill-opacity: 0.55; }
    .swatch-peak { fill-opacity: 1; }
    .slice-label { font: 700 12px ui-monospace, SFMono-Regular, Menlo, monospace; fill: #0b1f24; stroke: none; }
    .warning { font: 500 10px ui-monospace, SFMono-Regular, Menlo, monospace; fill: #fbbf24; }
    .slice { fill: #22d3ee; fill-opacity: 0.82; }
    .slice-peak { fill: #22d3ee; fill-opacity: 1; filter: url(#glow); }
    text { paint-order: stroke; stroke: #0d1117; stroke-width: 2.6; stroke-linejoin: round; }
    @media (prefers-color-scheme: light) {
      text { stroke: #ffffff; }
      .panel { fill: #0b1f2a; fill-opacity: 0.025; stroke: #0b1f2a; stroke-opacity: 0.08; }
      .title { fill: #0891b2; }
      .subtitle { fill: #57606a; }
      .center-num { fill: #0891b2; }
      .center-sub { fill: #57606a; }
      .center-streak { fill: #b45309; }
      .legend-label { fill: #1f2328; }
      .legend-peak { fill: #0891b2; }
      .warning { fill: #b45309; }
      /* Slice/swatch fills come from per-day inline colours (same in both
         themes), so no fill override here. Keep slice labels dark for contrast
         on the colourful slices. */
    }
    @media (prefers-reduced-motion: reduce) {
      animate, animateTransform { display: none; }
    }
  </style>
