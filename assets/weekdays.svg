    <path d="M 221.46 303.69 A 132 132 0 0 1 149.66 302.31 L 163.02 258.29 A 86 86 0 0 0 209.80 259.19 Z" class="slice" style="transform-origin:188 176;opacity:1" transform="scale(1)"><title>Thu: 75 contributions · 9.2% of the last 91 days</title><animateTransform attributeName="transform" type="scale" values="0.82;1" begin="0.45s" dur="0.6s" fill="freeze" calcMode="spline" keyTimes="0;1" keySplines="0.2 0.8 0.2 1"/><animate attributeName="opacity" values="0;1" begin="0.45s" dur="0.6s" fill="freeze"/></path>
    <path d="M 146.50 301.31 A 132 132 0 0 1 89.03 263.34 L 123.52 232.91 A 86 86 0 0 0 160.96 257.64 Z" class="slice" style="transform-origin:188 176;opacity:1" transform="scale(1)"><title>Fri: 72 contributions · 8.8% of the last 91 days</title><animateTransform attributeName="transform" type="scale" values="0.82;1" begin="0.55s" dur="0.6s" fill="freeze" calcMode="spline" keyTimes="0;1" keySplines="0.2 0.8 0.2 1"/><animate attributeName="opacity" values="0;1" begin="0.55s" dur="0.6s" fill="freeze"/></path>
    <path d="M 86.87 260.83 A 132 132 0 0 1 64.11 130.45 L 107.28 146.33 A 86 86 0 0 0 122.11 231.27 Z" class="slice" style="transform-origin:188 176;opacity:1" transform="scale(1)"><title>Sat: 140 contributions · 17.1% of the last 91 days</title><animateTransform attributeName="transform" type="scale" values="0.82;1" begin="0.65s" dur="0.6s" fill="freeze" calcMode="spline" keyTimes="0;1" keySplines="0.2 0.8 0.2 1"/><animate attributeName="opacity" values="0;1" begin="0.65s" dur="0.6s" fill="freeze"/></path>
    <path d="M 65.29 127.35 A 132 132 0 0 1 186.34 44.01 L 186.92 90.01 A 86 86 0 0 0 108.05 144.31 Z" class="slice slice-peak" style="transform-origin:188 176;opacity:1" transform="scale(1)"><title>Sun: 157 contributions · 19.2% of the last 91 days</title><animate attributeName="opacity" values="1;0.68;1" dur="2.6s" begin="1.3s" repeatCount="indefinite"/><animateTransform attributeName="transform" type="scale" values="0.82;1" begin="0.75s" dur="0.6s" fill="freeze" calcMode="spline" keyTimes="0;1" keySplines="0.2 0.8 0.2 1"/></path>
    <text x="188" y="172" text-anchor="middle" class="center-num">818</text>
    <text x="188" y="194" text-anchor="middle" class="center-sub">91 days</text>
  </g>
  <g class="legend">
