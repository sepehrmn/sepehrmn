      <text x="410" y="188" class="legend-label">Fri</text>
      <text x="584" y="188" text-anchor="end" class="legend-label">8.8%</text>
    <rect x="388" y="203" width="12" height="12" rx="2" class="legend-swatch"/>
      <text x="410" y="212" class="legend-label">Sat</text>
