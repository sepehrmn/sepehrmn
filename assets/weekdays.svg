    <path d="M 221.01 303.81 A 132 132 0 0 1 149.13 302.15 L 162.68 258.19 A 86 86 0 0 0 209.51 259.27 Z" class="slice" style="transform-origin:188 176;opacity:1" transform="scale(1)"><title>Thu: 75 contributions · 9.2% of the last 91 days</title><animateTransform attributeName="transform" type="scale" values="0.82;1" begin="0.45s" dur="0.6s" fill="freeze" calcMode="spline" keyTimes="0;1" keySplines="0.2 0.8 0.2 1"/><animate attributeName="opacity" values="0;1" begin="0.45s" dur="0.6s" fill="freeze"/></path>
    <path d="M 145.97 301.13 A 132 132 0 0 1 89.27 263.62 L 123.68 233.09 A 86 86 0 0 0 160.62 257.52 Z" class="slice" style="transform-origin:188 176;opacity:1" transform="scale(1)"><title>Fri: 71 contributions · 8.7% of the last 91 days</title><animateTransform attributeName="transform" type="scale" values="0.82;1" begin="0.55s" dur="0.6s" fill="freeze" calcMode="spline" keyTimes="0;1" keySplines="0.2 0.8 0.2 1"/><animate attributeName="opacity" values="0;1" begin="0.55s" dur="0.6s" fill="freeze"/></path>
    <path d="M 87.10 261.11 A 132 132 0 0 1 64.04 130.64 L 107.24 146.45 A 86 86 0 0 0 122.26 231.45 Z" class="slice" style="transform-origin:188 176;opacity:1" transform="scale(1)"><title>Sat: 140 contributions · 17.1% of the last 91 days</title><animateTransform attributeName="transform" type="scale" values="0.82;1" begin="0.65s" dur="0.6s" fill="freeze" calcMode="spline" keyTimes="0;1" keySplines="0.2 0.8 0.2 1"/><animate attributeName="opacity" values="0;1" begin="0.65s" dur="0.6s" fill="freeze"/></path>
    <path d="M 65.22 127.54 A 132 132 0 0 1 186.34 44.01 L 186.92 90.01 A 86 86 0 0 0 108.01 144.42 Z" class="slice slice-peak" style="transform-origin:188 176;opacity:1" transform="scale(1)"><title>Sun: 157 contributions · 19.2% of the last 91 days</title><animate attributeName="opacity" values="1;0.68;1" dur="2.6s" begin="1.3s" repeatCount="indefinite"/><animateTransform attributeName="transform" type="scale" values="0.82;1" begin="0.75s" dur="0.6s" fill="freeze" calcMode="spline" keyTimes="0;1" keySplines="0.2 0.8 0.2 1"/></path>
    <text x="188" y="172" text-anchor="middle" class="center-num">817</text>
    <text x="188" y="194" text-anchor="middle" class="center-sub">91 days</text>
  </g>
