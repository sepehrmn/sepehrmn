<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 395 150" width="395" height="150" role="img" aria-label="engram (private): Engram Neural Modeling Labs, the hub: neural-network and neural-modeling experiments that drive the rest of the stack.">
  <defs>
    <radialGradient id="wash0" cx="8%" cy="0%" r="120%"><stop offset="0%" stop-color="#0b2b33" stop-opacity="0.9"/><stop offset="60%" stop-color="#0b2b33" stop-opacity="0"/></radialGradient>
  </defs>
  <style>
    :root { --accent: #22d3ee; }
    .card       { fill: #0d1117; fill-opacity: 0.55; stroke: #ffffff; stroke-opacity: 0.09; stroke-width: 1; }
    .title      { font: 700 17px ui-monospace, SFMono-Regular, Menlo, monospace; }
    .desc       { font: 400 12px ui-monospace, SFMono-Regular, Menlo, monospace; fill: #9da7b3; }
    .badge      { font: 600 12px ui-monospace, SFMono-Regular, Menlo, monospace; }
    .chip       { fill: #0d1117; fill-opacity: 0.6; stroke-width: 1.3; }
    .chip-label { font: 600 11px ui-monospace, SFMono-Regular, Menlo, monospace; }
    .c0.title { fill: #22d3ee; } .c0.rule { fill: #22d3ee; } .c0.spine { stroke: #22d3ee; } .c0.badge { fill: #22d3ee; } .c0.chip { stroke: #22d3ee; } .c0.chip-label { fill: #22d3ee; } .c0.glyph-fill { fill: #22d3ee; } .c0.glyph-stroke { stroke: #22d3ee; }
    text { paint-order: stroke; stroke: #0d1117; stroke-width: 2.6; stroke-linejoin: round; }
    @media (prefers-color-scheme: light) {
      text { stroke: #ffffff; }
      :root { --accent: #0891b2; }
      .card { fill: #ffffff; fill-opacity: 0.9; stroke: #0b1f2a; stroke-opacity: 0.1; }
      /* The accent wash is a dark-mode bloom; on white it only muddies the
         card, so hide it entirely in light mode (the accent spine + title
         carry the colour there). */
      .wash { display: none; }
      .desc { fill: #57606a; }
      .chip { fill: #ffffff; fill-opacity: 0.7; }
      .c0.title { fill: #0891b2; } .c0.rule { fill: #0891b2; } .c0.spine { stroke: #0891b2; } .c0.badge { fill: #0891b2; } .c0.chip { stroke: #0891b2; } .c0.chip-label { fill: #0891b2; } .c0.glyph-fill { fill: #0891b2; } .c0.glyph-stroke { stroke: #0891b2; }
    }
    /* Hover / click effects — visible when the SVG is viewed directly or
       embedded inline or via object (GitHub img sandboxes internal
       :hover, so these are progressive enhancement for every other context). */
    .card-group {
      cursor: pointer;
      transition: transform 0.25s cubic-bezier(0.34, 1.56, 0.64, 1),
                  filter 0.25s ease;
    }
    .card-group:hover {
      transform: translateY(-4px);
      filter: drop-shadow(0 8px 20px rgba(0, 0, 0, 0.45));
    }
    .card-group:hover .card { stroke-opacity: 0.22; }
    .card-group:hover .spine {
      stroke-width: 5;
      filter: drop-shadow(0 0 5px var(--accent));
    }
    .card-group:hover .wash { opacity: 1; }
    .card-group:hover .title { filter: drop-shadow(0 0 4px var(--accent)); }
    .card-group:active {
      transform: translateY(-1px);
      filter: drop-shadow(0 3px 8px rgba(0, 0, 0, 0.3));
      transition: transform 0.08s ease, filter 0.08s ease;
    }
    @media (prefers-reduced-motion: reduce) {
      .card-group, .card-group:hover, .card-group:active {
        transition: none; transform: none;
      }
    }
  </style>
  <g class="card-group">
    <rect x="1" y="0" width="393" height="150" rx="14" class="card"/>
    <rect x="1" y="0" width="393" height="150" rx="14" fill="url(#wash0)" class="wash"/>
    <path d="M2.5 14 v122" class="spine c0" stroke-width="4" stroke-linecap="round"/>
    <text x="23" y="38" class="title c0" textLength="78" lengthAdjust="spacingAndGlyphs">engram</text>
    <rect x="23" y="46" width="34" height="2.5" rx="1.25" class="rule c0"/>
    <g transform="translate(365 16) scale(0.78)"><path d="M2 6 V4.4 a4 4 0 0 1 8 0 V6" fill="none" class="glyph-stroke c0" stroke-width="1.6"/><rect x="0" y="6" width="12" height="9" rx="1.6" class="glyph-fill c0"/></g><text x="360" y="28" text-anchor="end" class="badge c0">private</text>
    <text x="23" y="60" class="desc">Engram Neural Modeling Labs, the hub:</text>
    <text x="23" y="78" class="desc">neural-network and neural-modeling experiments</text>
    <text x="23" y="96" class="desc">that drive the rest of the stack.</text>
    <g><rect x="23" y="110" width="66" height="22" rx="6" class="chip c0"/><text x="56" y="125" text-anchor="middle" class="chip-label c0">Python</text></g>
  </g>
</svg>
