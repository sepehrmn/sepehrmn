<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 750" width="860" height="750" role="img" aria-label="Selected work: eight project cards. engram (private): Engram Neural Modeling Labs, the neural-modeling hub, Python. NCP (1 star): safety-gated provenance-first wire protocol, Rust. prisoma (private): a prism for embodied agents, robotics and world models: Vision-Language-Action analysis via several native methods including PID, Rust and Python. crebain (8 stars): tactical visualization and autonomy prototype, TypeScript, Rust, Nix. melkor (1 star): Gaussian-splatting and depth-analysis pipelines for 3D reconstruction, Python, C++, CUDA. cortexel: agent-consumable scientific-visualization library for neural simulations: VizSpec to spike rasters and STDP curves with fail-closed provenance, TypeScript, React, Three.js. pid-rs (1 star): Partial Information Decomposition estimators in Rust. cobot-atlas (2 stars): 3D mesh-generation pipeline, Python.">
