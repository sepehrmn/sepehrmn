      .c3.title { fill: #4b5320; } .c3.rule { fill: #4b5320; } .c3.spine { stroke: #4b5320; } .c3.badge { fill: #4b5320; } .c3.chip { stroke: #4b5320; } .c3.chip-label { fill: #4b5320; } .c3.glyph-fill { fill: #4b5320; } .c3.glyph-stroke { stroke: #4b5320; }
      .c4.title { fill: #c2410c; } .c4.rule { fill: #c2410c; } .c4.spine { stroke: #c2410c; } .c4.badge { fill: #c2410c; } .c4.chip { stroke: #c2410c; } .c4.chip-label { fill: #c2410c; } .c4.glyph-fill { fill: #c2410c; } .c4.glyph-stroke { stroke: #c2410c; }
      .c5.title { fill: #c026d3; } .c5.rule { fill: #c026d3; } .c5.spine { stroke: #c026d3; } .c5.badge { fill: #c026d3; } .c5.chip { stroke: #c026d3; } .c5.chip-label { fill: #c026d3; } .c5.glyph-fill { fill: #c026d3; } .c5.glyph-stroke { stroke: #c026d3; }
