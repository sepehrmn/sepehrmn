         colour there). */
      .wash { display: none; }
      .desc { fill: #57606a; }
      .chip { fill: #ffffff; fill-opacity: 0.7; }
      .c0.title { fill: #0891b2; } .c0.rule { fill: #0891b2; } .c0.spine { stroke: #0891b2; } .c0.badge { fill: #0891b2; } .c0.chip { stroke: #0891b2; } .c0.chip-label { fill: #0891b2; } .c0.glyph-fill { fill: #0891b2; } .c0.glyph-stroke { stroke: #0891b2; }
