    <path d="M 163 230 Q 190.3 221.3 217.5 230" fill="none" stroke="url(#eg0)" stroke-width="3" stroke-linecap="round" class="edge-live"><animate attributeName="opacity" values="0.7;1;0.7" dur="2.8s" begin="0.00s" repeatCount="indefinite"/></path>
    <path d="M 281.8 214.8 Q 337.1 163 412.1 152.8" fill="none" stroke="url(#eg1)" stroke-width="3" stroke-linecap="round" class="edge-live"><animate attributeName="opacity" values="0.7;1;0.7" dur="2.8s" begin="0.30s" repeatCount="indefinite"/></path>
    <path d="M 281.8 245.4 Q 338.4 299.5 415.9 310.6" fill="none" stroke="url(#eg2)" stroke-width="3" stroke-linecap="round" class="edge-live"><animate attributeName="opacity" values="0.7;1;0.7" dur="2.8s" begin="0.60s" repeatCount="indefinite"/></path>
  </g>
  <g class="flows">
    <path d="M 163 230 Q 190.3 221.3 217.5 230" class="flow"><animate attributeName="stroke-dashoffset" from="24" to="0" dur="1.5s" repeatCount="indefinite"/></path>
    <path d="M 163 230 Q 190.3 221.3 217.5 230" class="flow flow-rev"><animate attributeName="stroke-dashoffset" from="0" to="24" dur="2.1s" repeatCount="indefinite"/></path>
    <path d="M 281.8 214.8 Q 337.1 163 412.1 152.8" class="flow"><animate attributeName="stroke-dashoffset" from="24" to="0" dur="1.5s" repeatCount="indefinite"/></path>
    <path d="M 281.8 214.8 Q 337.1 163 412.1 152.8" class="flow flow-rev"><animate attributeName="stroke-dashoffset" from="0" to="24" dur="2.1s" repeatCount="indefinite"/></path>
    <path d="M 281.8 245.4 Q 338.4 299.5 415.9 310.6" class="flow"><animate attributeName="stroke-dashoffset" from="24" to="0" dur="1.5s" repeatCount="indefinite"/></path>
    <path d="M 281.8 245.4 Q 338.4 299.5 415.9 310.6" class="flow flow-rev"><animate attributeName="stroke-dashoffset" from="0" to="24" dur="2.1s" repeatCount="indefinite"/></path>
  </g>
  <g class="nodes">
    <g>
    <rect x="64" y="184" width="92" height="92" rx="16" class="cube"/>
    <g transform="translate(104 200.5) scale(1)"><path d="M2 6 V4.4 a4 4 0 0 1 8 0 V6" fill="none" stroke="var(--cube-accent)" stroke-width="1.5"/><rect x="0" y="6" width="12" height="9" rx="1.6" fill="var(--cube-accent)"/></g>
    <text x="110" y="242" text-anchor="middle" class="cube-label">engram</text>
  </g>
  <g>
