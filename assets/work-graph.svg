<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 460" width="860" height="460" role="img" aria-label="Project graph — engram (private) and crebain connect through the always-on NCP protocol to prisoma, a private hub; pid-rs, cobot-atlas and cobot-relief connect to prisoma; cobot-atlas and cobot-relief also connect to crebain.">
  <defs>
    <radialGradient id="hubGrad" cx="50%" cy="42%" r="65%">
      <stop offset="0%" stop-color="#241a44"/>
      <stop offset="100%" stop-color="#0a1117"/>
    </radialGradient>
    <radialGradient id="cubeGrad" cx="50%" cy="42%" r="70%">
      <stop offset="0%" stop-color="#0b2b33"/>
      <stop offset="100%" stop-color="#0a1117"/>
    </radialGradient>
    <radialGradient id="triGrad" cx="50%" cy="56%" r="70%">
      <stop offset="0%" stop-color="#2b1020"/>
      <stop offset="100%" stop-color="#0a1117"/>
    </radialGradient>
    <filter id="soft" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="edgeGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="2.4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="eg0" gradientUnits="userSpaceOnUse" x1="163" y1="230" x2="217.5" y2="230"><stop offset="0%" stop-color="#22d3ee"/><stop offset="100%" stop-color="#fbbf24"/></linearGradient>
    <linearGradient id="eg1" gradientUnits="userSpaceOnUse" x1="281.8" y1="214.8" x2="412.1" y2="152.8"><stop offset="0%" stop-color="#fbbf24"/><stop offset="100%" stop-color="#a78bfa"/></linearGradient>
    <linearGradient id="eg2" gradientUnits="userSpaceOnUse" x1="281.8" y1="245.4" x2="415.9" y2="310.6"><stop offset="0%" stop-color="#fbbf24"/><stop offset="100%" stop-color="#f472b6"/></linearGradient>
    <linearGradient id="eg3" gradientUnits="userSpaceOnUse" x1="298.4" y1="96.1" x2="408.1" y2="119.1"><stop offset="0%" stop-color="#34d399"/><stop offset="100%" stop-color="#a78bfa"/></linearGradient>
    <linearGradient id="eg4" gradientUnits="userSpaceOnUse" x1="622.2" y1="165.3" x2="511.8" y2="141.3"><stop offset="0%" stop-color="#60a5fa"/><stop offset="100%" stop-color="#a78bfa"/></linearGradient>
    <linearGradient id="eg5" gradientUnits="userSpaceOnUse" x1="659.6" y1="260.2" x2="504.4" y2="159"><stop offset="0%" stop-color="#fb7185"/><stop offset="100%" stop-color="#a78bfa"/></linearGradient>
    <linearGradient id="eg6" gradientUnits="userSpaceOnUse" x1="500.9" y1="305" x2="659.9" y2="199.9"><stop offset="0%" stop-color="#f472b6"/><stop offset="100%" stop-color="#60a5fa"/></linearGradient>
    <linearGradient id="eg7" gradientUnits="userSpaceOnUse" x1="507.8" y1="321.2" x2="618.2" y2="296.2"><stop offset="0%" stop-color="#f472b6"/><stop offset="100%" stop-color="#fb7185"/></linearGradient>
  </defs>
  <style>
    :root { --hub-accent: #a78bfa; --cube-accent: #22d3ee; }
    .cap        { font: 600 11px ui-monospace, SFMono-Regular, Menlo, monospace; fill: #6e7681; letter-spacing: 2px; }
    .edge       { opacity: 0.55; }
    .edge-live  { filter: url(#edgeGlow); }
    .flow       { fill: none; stroke: #e2faff; stroke-width: 2.4; stroke-dasharray: 1.5 9; stroke-linecap: round; opacity: 0.9; }
    .flow-rev   { stroke-width: 1.8; opacity: 0.45; }
    .chip       { fill: #0d1117; stroke-width: 1.5; }
    .chip-label { font: 600 13px ui-monospace, SFMono-Regular, Menlo, monospace; fill: #c9d1d9; }
    .hub        { fill: url(#hubGrad); stroke: #a78bfa; stroke-width: 2; filter: url(#soft); }
    .hub-label  { font: 700 16px ui-monospace, SFMono-Regular, Menlo, monospace; fill: #c4b5fd; }
    .cube       { fill: url(#cubeGrad); stroke: #22d3ee; stroke-width: 2; filter: url(#soft); }
    .cube-label { font: 700 16px ui-monospace, SFMono-Regular, Menlo, monospace; fill: #67e8f9; }
    .tri        { fill: url(#triGrad); stroke: #f472b6; stroke-width: 2; filter: url(#soft); }
    .tri-label  { font: 700 14px ui-monospace, SFMono-Regular, Menlo, monospace; fill: #f9a8d4; }
    .panel      { fill: #ffffff; fill-opacity: 0.022; stroke: #ffffff; stroke-opacity: 0.07; }
    @media (prefers-color-scheme: light) {
      :root { --hub-accent: #7c3aed; --cube-accent: #0891b2; }
      .cap { fill: #57606a; }
      .flow { stroke: #22d3ee; }
      .chip { fill: #ffffff; }
      .chip-label { fill: #1f2328; }
      .hub { fill: #ffffff; stroke: #7c3aed; }
      .hub-label { fill: #6d28d9; }
      .cube { fill: #ffffff; stroke: #0891b2; }
      .cube-label { fill: #0891b2; }
      .tri { fill: #ffffff; stroke: #db2777; }
      .tri-label { fill: #be185d; }
      .panel { fill: #0b1f2a; fill-opacity: 0.025; stroke: #0b1f2a; stroke-opacity: 0.08; }
    }
    @media (prefers-reduced-motion: reduce) { animate { display: none; } }
  </style>

  <rect x="0.5" y="0.5" width="859" height="459" rx="16" class="panel"/>
  <text x="40" y="40" class="cap">THE&#160;SYSTEM&#160;&#8212;&#160;HOW&#160;THE&#160;WORK&#160;CONNECTS</text>

  <g class="edges">
    <path d="M 298.4 96.1 Q 356.9 90.1 408.1 119.1" fill="none" stroke="url(#eg3)" stroke-width="2" stroke-linecap="round" class="edge"/>
    <path d="M 622.2 165.3 Q 570.8 135.6 511.8 141.3" fill="none" stroke="url(#eg4)" stroke-width="2" stroke-linecap="round" class="edge"/>
    <path d="M 659.6 260.2 Q 596.2 187.8 504.4 159" fill="none" stroke="url(#eg5)" stroke-width="2" stroke-linecap="round" class="edge"/>
    <path d="M 500.9 305 Q 594.7 274.1 659.9 199.9" fill="none" stroke="url(#eg6)" stroke-width="2" stroke-linecap="round" class="edge"/>
    <path d="M 507.8 321.2 Q 567 326.4 618.2 296.2" fill="none" stroke="url(#eg7)" stroke-width="2" stroke-linecap="round" class="edge"/>
    <path d="M 163 230 Q 190.3 238.7 217.5 230" fill="none" stroke="url(#eg0)" stroke-width="3" stroke-linecap="round" class="edge-live"><animate attributeName="opacity" values="0.7;1;0.7" dur="2.8s" begin="0.00s" repeatCount="indefinite"/></path>
    <path d="M 281.8 214.8 Q 337.1 163 412.1 152.8" fill="none" stroke="url(#eg1)" stroke-width="3" stroke-linecap="round" class="edge-live"><animate attributeName="opacity" values="0.7;1;0.7" dur="2.8s" begin="0.30s" repeatCount="indefinite"/></path>
    <path d="M 281.8 245.4 Q 338.4 299.5 415.9 310.6" fill="none" stroke="url(#eg2)" stroke-width="3" stroke-linecap="round" class="edge-live"><animate attributeName="opacity" values="0.7;1;0.7" dur="2.8s" begin="0.60s" repeatCount="indefinite"/></path>
  </g>
  <g class="flows">
    <path d="M 163 230 Q 190.3 238.7 217.5 230" class="flow"><animate attributeName="stroke-dashoffset" from="24" to="0" dur="1.5s" repeatCount="indefinite"/></path>
    <path d="M 163 230 Q 190.3 238.7 217.5 230" class="flow flow-rev"><animate attributeName="stroke-dashoffset" from="0" to="24" dur="2.1s" repeatCount="indefinite"/></path>
    <path d="M 281.8 214.8 Q 337.1 163 412.1 152.8" class="flow"><animate attributeName="stroke-dashoffset" from="24" to="0" dur="1.5s" repeatCount="indefinite"/></path>
    <path d="M 281.8 214.8 Q 337.1 163 412.1 152.8" class="flow flow-rev"><animate attributeName="stroke-dashoffset" from="0" to="24" dur="2.1s" repeatCount="indefinite"/></path>
    <path d="M 281.8 245.4 Q 338.4 299.5 415.9 310.6" class="flow"><animate attributeName="stroke-dashoffset" from="24" to="0" dur="1.5s" repeatCount="indefinite"/></path>
    <path d="M 281.8 245.4 Q 338.4 299.5 415.9 310.6" class="flow flow-rev"><animate attributeName="stroke-dashoffset" from="0" to="24" dur="2.1s" repeatCount="indefinite"/></path>
  </g>
  <g class="nodes">
    <g>
    <rect x="64" y="184" width="92" height="92" rx="16" class="cube"/>
    <g transform="translate(104 200.5) scale(1)"><path d="M2 6 V4.4 a4 4 0 0 1 8 0 V6" fill="none" stroke="var(--cube-accent)" stroke-width="1.5"/><rect x="0" y="6" width="12" height="9" rx="1.6" fill="var(--cube-accent)"/></g>
    <text x="110" y="242" text-anchor="middle" class="cube-label">engram</text>
  </g>
  <g>
    <rect x="208.5" y="70" width="83" height="32" rx="8" class="chip" stroke="#34d399"/>
    <circle cx="223.5" cy="86" r="4" fill="#34d399"/>
    <text x="235.5" y="91" class="chip-label">pid-rs</text>
  </g>
  <g>
    <rect x="224.5" y="214" width="51" height="32" rx="16" class="chip" stroke="#fbbf24"/>
    <text x="250" y="235" text-anchor="middle" class="chip-label" style="fill:#fbbf24">NCP</text>
  </g>
  <g>
    <circle cx="460" cy="130" r="46" class="hub">
      <animate attributeName="r" values="46;48;46" dur="3.2s" repeatCount="indefinite"/>
    </circle>
    <g transform="translate(454 98.5) scale(1)"><path d="M2 6 V4.4 a4 4 0 0 1 8 0 V6" fill="none" stroke="var(--hub-accent)" stroke-width="1.5"/><rect x="0" y="6" width="12" height="9" rx="1.6" fill="var(--hub-accent)"/></g>
    <text x="460" y="142" text-anchor="middle" class="hub-label">prisoma</text>
  </g>
  <g>
    <polygon points="460,279 505.9,358.5 414.1,358.5" class="tri" stroke-linejoin="round"/>
    <text x="460" y="352" text-anchor="middle" class="tri-label">crebain</text>
  </g>
  <g>
    <rect x="629" y="164" width="122" height="32" rx="8" class="chip" stroke="#60a5fa"/>
    <circle cx="644" cy="180" r="4" fill="#60a5fa"/>
    <text x="656" y="185" class="chip-label">cobot-atlas</text>
  </g>
  <g>
    <rect x="625" y="264" width="130" height="32" rx="8" class="chip" stroke="#fb7185"/>
    <circle cx="640" cy="280" r="4" fill="#fb7185"/>
    <text x="652" y="285" class="chip-label">cobot-relief</text>
  </g>
  </g>
</svg>
