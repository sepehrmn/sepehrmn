    <g transform="translate(454 98.5) scale(1)"><path d="M2 6 V4.4 a4 4 0 0 1 8 0 V6" fill="none" stroke="var(--hub-accent)" stroke-width="1.5"/><rect x="0" y="6" width="12" height="9" rx="1.6" fill="var(--hub-accent)"/></g>
    <text x="460" y="142" text-anchor="middle" class="hub-label">prisoma</text>
  </g>
  <g>
    <polygon points="460,279 505.9,358.5 414.1,358.5" class="tri" stroke-linejoin="round"/>
    <text x="460" y="352" text-anchor="middle" class="tri-label">crebain</text>
  </g>
  <g>
    <rect x="629" y="134" width="122" height="32" rx="8" class="chip" stroke="#60a5fa"/>
    <circle cx="644" cy="150" r="4" fill="#60a5fa"/>
    <text x="656" y="155" class="chip-label">cobot-atlas</text>
  </g>
  <g>
