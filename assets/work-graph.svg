<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 400" width="820" height="400" role="img" aria-label="Project graph — engram at the center connects through the NCP protocol to crebain (robotics) and pid-rs (analysis); pid-rs feeds cobot-atlas (meshes); a link out to more repositories.">
  <defs>
    <radialGradient id="hubGrad" cx="50%" cy="42%" r="65%">
      <stop offset="0%" stop-color="#0b3a44"/>
      <stop offset="100%" stop-color="#0a1117"/>
    </radialGradient>
    <filter id="soft" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <style>
    .cap        { font: 600 11px ui-monospace, SFMono-Regular, Menlo, monospace; fill: #6e7681; letter-spacing: 2px; }
    .edge       { fill: none; stroke: #30363d; stroke-width: 1.5; }
    .edge-rel   { fill: none; stroke: #30363d; stroke-width: 1.5; stroke-dasharray: 5 5; }
    .flow       { fill: none; stroke: #22d3ee; stroke-width: 2; stroke-dasharray: 1 9; stroke-linecap: round; opacity: 0.9; }
    .edge-label { font: 500 10px ui-monospace, SFMono-Regular, Menlo, monospace; fill: #8b949e; }
    .chip       { fill: #0d1117; stroke-width: 1.5; }
    .chip-label { font: 600 13px ui-monospace, SFMono-Regular, Menlo, monospace; fill: #c9d1d9; }
    .chip-role  { font: 500 9px ui-monospace, SFMono-Regular, Menlo, monospace; fill: #8b949e; }
    .hub        { fill: url(#hubGrad); stroke: #22d3ee; stroke-width: 2; filter: url(#soft); }
    .hub-label  { font: 700 16px ui-monospace, SFMono-Regular, Menlo, monospace; fill: #67e8f9; }
    .hub-role   { font: 500 10px ui-monospace, SFMono-Regular, Menlo, monospace; fill: #8b949e; }
    @media (prefers-color-scheme: light) {
      .cap { fill: #57606a; }
      .edge, .edge-rel { stroke: #d0d7de; }
      .flow { stroke: #0891b2; }
      .edge-label { fill: #57606a; }
      .chip { fill: #ffffff; }
      .chip-label { fill: #1f2328; }
      .chip-role { fill: #57606a; }
      .hub { fill: #ffffff; stroke: #0891b2; }
      .hub-label { fill: #0891b2; }
      .hub-role { fill: #57606a; }
    }
    .panel { fill: #ffffff; fill-opacity: 0.022; stroke: #ffffff; stroke-opacity: 0.07; }
    @media (prefers-color-scheme: light) {
      .panel { fill: #0b1f2a; fill-opacity: 0.025; stroke: #0b1f2a; stroke-opacity: 0.08; }
    }
    @media (prefers-reduced-motion: reduce) { animate { display: none; } }
  </style>

  <rect x="0.5" y="0.5" width="819" height="399" rx="16" class="panel"/>
  <text x="40" y="40" class="cap">THE&#160;SYSTEM&#160;&#8212;&#160;HOW&#160;THE&#160;WORK&#160;CONNECTS</text>

  <!-- ============================ EDGES ============================ -->
  <!-- engram -> NCP -->
  <path id="e1" d="M235 205 L397 205" class="edge"/>
  <!-- NCP -> crebain -->
  <path id="e2" d="M453 198 L579 130" class="edge"/>
  <!-- NCP -> pid-rs -->
  <path id="e3" d="M453 214 L558 292" class="edge"/>
  <!-- pid-rs -> cobot-atlas (related, dashed, no flow) -->
  <path id="e4" d="M642 305 L688 322" class="edge-rel"/>
  <!-- engram -> more repositories (faint) -->
  <path id="e5" d="M235 251 L233 330" class="edge-rel"/>

  <!-- Animated NCP data-flow: marching pulses from engram outward through NCP -->
  <path d="M235 205 L397 205" class="flow"><animate attributeName="stroke-dashoffset" from="20" to="0" dur="1.1s" repeatCount="indefinite"/></path>
  <path d="M453 198 L579 130" class="flow"><animate attributeName="stroke-dashoffset" from="20" to="0" dur="1.3s" repeatCount="indefinite"/></path>
  <path d="M453 214 L558 292" class="flow"><animate attributeName="stroke-dashoffset" from="20" to="0" dur="1.3s" repeatCount="indefinite"/></path>

  <!-- edge labels -->
  <text x="300" y="198" text-anchor="middle" class="edge-label">speaks</text>
  <text x="529" y="158" text-anchor="middle" class="edge-label">act</text>
  <text x="498" y="262" text-anchor="middle" class="edge-label">analyse</text>
  <text x="672" y="304" text-anchor="middle" class="edge-label">feeds</text>

  <!-- ============================ NODES ============================ -->
  <!-- crebain (robotics) -->
  <g>
    <rect x="579" y="103" width="98" height="40" rx="9" class="chip" stroke="#a78bfa"/>
    <circle cx="597" cy="123" r="4" fill="#a78bfa"/>
    <text x="609" y="120" class="chip-label">crebain</text>
    <text x="609" y="133" class="chip-role">robotics &#183; ARAS</text>
  </g>

  <!-- pid-rs (analysis) -->
  <g>
    <rect x="516" y="285" width="92" height="40" rx="9" class="chip" stroke="#34d399"/>
    <circle cx="534" cy="305" r="4" fill="#34d399"/>
    <text x="546" y="302" class="chip-label">pid-rs</text>
    <text x="546" y="315" class="chip-role">info-theory</text>
  </g>

  <!-- cobot-atlas (meshes) -->
  <g>
    <rect x="688" y="305" width="118" height="40" rx="9" class="chip" stroke="#60a5fa"/>
    <circle cx="706" cy="325" r="4" fill="#60a5fa"/>
    <text x="718" y="322" class="chip-label">cobot-atlas</text>
    <text x="718" y="335" class="chip-role">3D meshes</text>
  </g>

  <!-- more repositories -->
  <g>
    <rect x="172" y="330" width="122" height="34" rx="9" class="chip" stroke="#6e7681"/>
    <text x="186" y="351" class="chip-label" style="font-size:12px">more repos &#8595;</text>
  </g>

  <!-- NCP (the connective protocol) -->
  <g>
    <rect x="397" y="188" width="56" height="34" rx="17" class="chip" stroke="#fbbf24"/>
    <text x="425" y="209" text-anchor="middle" class="chip-label" style="fill:#fbbf24">NCP</text>
  </g>

  <!-- engram (hub) -->
  <g>
    <circle cx="235" cy="205" r="46" class="hub">
      <animate attributeName="r" values="46;48;46" dur="3.2s" repeatCount="indefinite"/>
    </circle>
    <text x="235" y="202" text-anchor="middle" class="hub-label">engram</text>
    <text x="235" y="219" text-anchor="middle" class="hub-role">neural modeling</text>
  </g>
</svg>
