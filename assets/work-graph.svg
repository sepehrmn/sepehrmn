<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 460" width="860" height="460" role="img" aria-label="Project graph — engram (private) and crebain connect through the always-on NCP protocol to prisoma, a private hub; pid-rs, cobot-atlas, melkor and cobot-relief connect to prisoma; cobot-atlas, melkor and cobot-relief also connect to crebain; cortexel connects to engram.">
  <defs>
    <radialGradient id="hubGrad" cx="50%" cy="42%" r="65%">
      <stop offset="0%" stop-color="#06281d"/>
      <stop offset="100%" stop-color="#0a1117"/>
    </radialGradient>
    <radialGradient id="cubeGrad" cx="50%" cy="42%" r="70%">
      <stop offset="0%" stop-color="#0b2b33"/>
      <stop offset="100%" stop-color="#0a1117"/>
    </radialGradient>
    <radialGradient id="triGrad" cx="50%" cy="56%" r="70%">
      <stop offset="0%" stop-color="#241a44"/>
      <stop offset="100%" stop-color="#0a1117"/>
    </radialGradient>
    <radialGradient id="hexGrad" cx="50%" cy="45%" r="70%">
      <stop offset="0%" stop-color="#2a1608"/>
      <stop offset="100%" stop-color="#0a1117"/>
    </radialGradient>
    <radialGradient id="trapGrad" cx="50%" cy="56%" r="70%">
      <stop offset="0%" stop-color="#2b1020"/>
      <stop offset="100%" stop-color="#0a1117"/>
