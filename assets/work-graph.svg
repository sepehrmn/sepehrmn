    <linearGradient id="eg1" gradientUnits="userSpaceOnUse" x1="281.8" y1="214.8" x2="411.5" y2="153.1"><stop offset="0%" stop-color="#fbbf24"/><stop offset="100%" stop-color="#a78bfa"/></linearGradient>
    <linearGradient id="eg2" gradientUnits="userSpaceOnUse" x1="281.8" y1="245.4" x2="428.8" y2="316.8"><stop offset="0%" stop-color="#fbbf24"/><stop offset="100%" stop-color="#f472b6"/></linearGradient>
    <linearGradient id="eg3" gradientUnits="userSpaceOnUse" x1="301.9" y1="96.9" x2="425.9" y2="122.8"><stop offset="0%" stop-color="#34d399"/><stop offset="100%" stop-color="#a78bfa"/></linearGradient>
    <linearGradient id="eg4" gradientUnits="userSpaceOnUse" x1="622" y1="144.1" x2="499.2" y2="133.4"><stop offset="0%" stop-color="#60a5fa"/><stop offset="100%" stop-color="#a78bfa"/></linearGradient>
    <linearGradient id="eg5" gradientUnits="userSpaceOnUse" x1="653.1" y1="230.7" x2="510" y2="156.1"><stop offset="0%" stop-color="#fb923c"/><stop offset="100%" stop-color="#a78bfa"/></linearGradient>
    <linearGradient id="eg6" gradientUnits="userSpaceOnUse" x1="668.2" y1="329.2" x2="492.8" y2="161.3"><stop offset="0%" stop-color="#fb7185"/><stop offset="100%" stop-color="#a78bfa"/></linearGradient>
    <linearGradient id="eg7" gradientUnits="userSpaceOnUse" x1="488.1" y1="309.8" x2="664.3" y2="170.3"><stop offset="0%" stop-color="#f472b6"/><stop offset="100%" stop-color="#60a5fa"/></linearGradient>
